<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10241a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MacroDock" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>MacroDock Setup</title>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("macrodock-theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    </script>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-onboarding">
    <main class="onboarding-screen">
      <section class="onboarding-card" aria-labelledby="onboardingTitle">
        <div class="auth-card-head">
          <div class="auth-mark auth-mark-small">M</div>
          <div>
            <span class="eyebrow">MacroDock</span>
            <h1 id="onboardingTitle">Set up your goals</h1>
          </div>
        </div>

        <p class="onboarding-copy">These details calculate your calorie target and keep your dashboard tied to your account.</p>

        <form id="accountForm" class="stacked-form onboarding-form">
          <label>
            Name
            <input id="accountName" type="text" autocomplete="name" placeholder="Your name" />
          </label>

          <div class="two-column">
            <label>
              Sex
              <select id="accountSex">
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </label>
            <label>
              Age
              <input id="accountAge" type="number" min="13" max="100" step="1" placeholder="Age" />
            </label>
            <label>
              Height (cm)
              <input id="accountHeight" type="number" min="100" max="230" step="1" placeholder="Height" />
            </label>
            <label>
              Weight (kg)
              <input id="accountWeight" type="number" min="35" max="250" step="0.1" placeholder="Weight" />
            </label>
          </div>

          <label>
            Activity level
            <select id="accountActivity">
              <option value="1.2">Sedentary</option>
              <option value="1.375">Light</option>
              <option value="1.55" selected>Moderate</option>
              <option value="1.725">Active</option>
              <option value="1.9">Very active</option>
            </select>
          </label>

          <div class="two-column">
            <label>
              Goal
              <select id="currentGoal">
                <option value="lose">Lose weight</option>
                <option value="maintain">Maintain weight</option>
                <option value="gain">Gain weight</option>
              </select>
            </label>
            <label>
              Weekly rate
              <select id="weeklyRate">
                <option value="0">0 lb / week</option>
                <option value="0.5">0.5 lb / week</option>
                <option value="1">1 lb / week</option>
                <option value="1.5">1.5 lb / week</option>
                <option value="2">2 lb / week</option>
              </select>
            </label>
          </div>

          <input id="goalWeight" type="hidden" />
          <input id="goalDate" type="hidden" />

          <button class="primary-button" type="submit">Start using MacroDock</button>
          <div id="accountSummary" class="account-summary" aria-live="polite">
            Add your metrics to calculate your daily calorie target.
          </div>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
